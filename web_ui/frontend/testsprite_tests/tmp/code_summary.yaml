version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - Zustand
  - Tailwind CSS
  - Chart.js
  - Axios
routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Main application page with all components
features:
  - name: Config Loader
    description: Load configuration from car directory
    files:
      - src/components/ConfigLoader.tsx
      - src/services/api.ts
    entry_route: /
    user_interactions:
      - View config path input field
      - Modify config path
      - Click Load button to load configuration
      - See error message if loading fails
    api_calls:
      - method: POST
        endpoint: /api/config/load
    auth_required: false
  - name: Tub Loader
    description: Load tub data records from car directory
    files:
      - src/components/TubLoader.tsx
      - src/services/api.ts
    entry_route: /
    user_interactions:
      - View tub path input field
      - Modify tub path
      - Click Load button to load tub data
      - See error message if loading fails
    api_calls:
      - method: POST
        endpoint: /api/tub/load
    auth_required: false
  - name: Tub Navigator
    description: Navigate and playback tub records with images
    files:
      - src/components/TubNavigator.tsx
      - src/services/api.ts
      - src/store/useStore.ts
    entry_route: /
    user_interactions:
      - View current record image
      - Click Play button to start playback
      - Click Pause button to stop playback
      - Click Previous/Next buttons to navigate
      - Click First/Last buttons to jump to start/end
      - Drag on chart to navigate to specific record
      - View playback speed and FPS display
    api_calls:
      - method: GET
        endpoint: /api/tub/image
    auth_required: false
  - name: Tub Chart
    description: Display steering and throttle data as interactive chart
    files:
      - src/components/TubChart.tsx
      - src/store/useStore.ts
    entry_route: /
    user_interactions:
      - View line chart with steering and throttle data
      - Hover over chart to see tooltip with values
      - Click on chart to navigate to specific record
      - See current position indicator on chart
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Application requires backend API running on port 8000
    location: src/services/api.ts
    impact: All features will fail without backend
  - issue: Default paths are hardcoded to specific user directory
    location: src/store/useStore.ts
    impact: May not work for different users without modification
  - issue: No error handling for missing image data
    location: src/components/TubNavigator.tsx
    impact: May display broken image if image data is invalid
